name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests, static analysis, code style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: laravel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, curl, fileinfo, openssl, pdo, pdo_sqlite, tokenizer, zip, gd, intl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php8.2-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.2-

      - name: Prepare .env
        run: cp .env.testing .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit tests
        run: php artisan test --parallel

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test
