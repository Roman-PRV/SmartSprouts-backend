; ─── PHP-FPM Pool: www ───────────────────────────────────────────────────────
; This file EXTENDS the default www pool with health-check endpoints.
; All mandatory pool settings (user, listen, pm.*) are preserved from the
; default www.conf shipped with php:8.2-fpm.
;
; Health-check usage (from within the container):
;   SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET \
;     cgi-fcgi -bind -connect 127.0.0.1:9000
; Expected response body: "pong"

[www]
user = www-data
group = www-data

listen = 9000

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Enable ping endpoint — returns "pong" with HTTP 200
ping.path = /ping
ping.response = pong

; Enable status page (optional — useful for monitoring)
pm.status_path = /status
