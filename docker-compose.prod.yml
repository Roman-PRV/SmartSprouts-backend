# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION OVERRIDES
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile tts up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  laravel:
    build:
      target: prod         # Builds the 'prod' stage (no Xdebug, optimised OPcache)
    # Env vars are injected directly by Coolify into container environment.
    # No bind-mount: code is baked into the image at build time via COPY in Dockerfile.
    # public/ is served via the laravel_public named volume (populated by entrypoint.sh).

  queue-worker:
    build:
      target: prod         # Optimised OPcache, no Xdebug

  nginx:
    # SERVICE_FQDN_NGINX tells Coolify this service is the public HTTP entry point.
    # Coolify then exposes a "Domains for nginx" field in the UI, auto-generates
    # Traefik labels and SSL cert when a domain is set, and attaches nginx to the
    # Coolify proxy network.
    environment:
      - SERVICE_FQDN_NGINX=/

  # mysql, redis, ukrainian-tts — no prod-specific overrides needed.
  # Base docker-compose.yml already provides:
  #   - restart: unless-stopped (Coolify-friendly; honours intentional shutdowns)
  #   - expose: <port> (internal only, no host port mapping)
  # In Coolify deployment, Traefik routes ${APP_DOMAIN} → nginx:80 via Docker network.
