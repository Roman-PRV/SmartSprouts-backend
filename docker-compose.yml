# ─────────────────────────────────────────────────────────────────────────────
# BASE DOCKER-COMPOSE CONFIGURATION
# Shared across all environments (dev & prod).
#
# Development:
#   docker compose up                        (auto-loads override.yml)
#   docker compose --profile tts up         (+ ukrainian-tts service)
#
# Production:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile tts up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  laravel:
    build:
      context: ./laravel
      dockerfile: docker/Dockerfile
    container_name: pp_laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - laravel_public:/var/www/public  # written by entrypoint.sh from public-src
      - ./laravel/storage:/var/www/storage
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  queue-worker:
    build:
      context: ./laravel
      dockerfile: docker/Dockerfile
    container_name: pp_queue_worker
    restart: unless-stopped
    working_dir: /var/www
    user: "33:33"
    env_file:
      - ./laravel/.env
    entrypoint: ["sh", "-c", "php artisan queue:work --queue=$${QUEUE_WORKER_QUEUES:-$${TTS_QUEUE:-tts},default} --tries=3 --sleep=3 --timeout=$${QUEUE_WORKER_TIMEOUT:-120}"]
    volumes:
      - laravel_public:/var/www/public
      - ./laravel/storage:/var/www/storage
    networks:
      - app-network
    depends_on:
      laravel:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: pp_mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD?}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laravel}
      MYSQL_USER: ${MYSQL_USER:-laravel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD?}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -u root --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: pp_nginx_server
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - laravel_public:/var/www/public:ro  # populated by laravel entrypoint from image
      - ./laravel/storage:/var/www/storage:ro
    depends_on:
      - laravel
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: pp_redis_cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD?}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  ukrainian-tts:
    profiles: ["tts"]
    build:
      context: ./python-services/ukrainian-tts
      dockerfile: Dockerfile
    container_name: pp_ukrainian_tts
    restart: unless-stopped
    environment:
      - TTS_MAX_TEXT_LENGTH=${TTS_MAX_TEXT_LENGTH:-2000}
      - TTS_CHUNK_SIZE=${TTS_CHUNK_SIZE:-200}
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:
  laravel_public:  # shared between laravel (write via entrypoint) and nginx (read-only)

networks:
  app-network:
    driver: bridge
