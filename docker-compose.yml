# ─────────────────────────────────────────────────────────────────────────────
# DOCKER-COMPOSE CONFIGURATION
#
# This file is the canonical, prod-ready compose. It is the SOLE file read by
# Coolify in production deploys.
#
# Development:
#   docker compose up                  (auto-merges docker-compose.override.yml)
#   docker compose --profile tts up    (also starts ukrainian-tts; defined in override)
#
# Production (Coolify):
#   reads only this file. Env vars and domain are injected via the Coolify UI.
# ─────────────────────────────────────────────────────────────────────────────

services:
  laravel:
    image: ghcr.io/roman-prv/smartsprouts-backend:latest
    pull_policy: always
    restart: unless-stopped
    working_dir: /var/www
    expose:
      - "9000"
    volumes:
      - laravel_public:/var/www/public
      - laravel_storage:/var/www/storage
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  queue-worker:
    image: ghcr.io/roman-prv/smartsprouts-backend:latest
    pull_policy: always
    restart: unless-stopped
    working_dir: /var/www
    user: "33:33"
    # Env vars are loaded per-environment:
    #   - dev: env_file: ./laravel/.env (set in docker-compose.override.yml)
    #   - prod: injected directly by Coolify into container environment
    entrypoint: ["sh", "-c", "php artisan queue:work --queue=$${QUEUE_WORKER_QUEUES:-$${TTS_QUEUE:-tts},default} --tries=3 --sleep=3 --timeout=$${QUEUE_WORKER_TIMEOUT:-120}"]
    volumes:
      - laravel_public:/var/www/public
      - laravel_storage:/var/www/storage  # named volume in prod; bind-mounted in dev (override)
    networks:
      - app-network
    depends_on:
      laravel:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    expose:
      - "3306"  # internal to docker network (for laravel container)
    ports:
      - "127.0.0.1:3306:3306"  # host loopback only — reachable via SSH tunnel, NEVER publicly
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD?}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laravel}
      MYSQL_USER: ${MYSQL_USER:-laravel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD?}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -u root --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - laravel_public:/var/www/public:ro
      - laravel_storage:/var/www/storage:ro
    depends_on:
      - laravel
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"  # internal only (host port mapping is added by dev override)
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD?}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ukrainian-tts is dev-only — defined in docker-compose.override.yml.
  # Production uses TTS_PROVIDER=elevenlabs and does not need a self-hosted TTS service.

volumes:
  mysql_data:
  redis_data:
  laravel_public:   # shared between laravel (write via entrypoint) and nginx (read-only)
  laravel_storage:  # persistent Laravel storage in prod; overridden by bind-mount in dev

networks:
  app-network:
    driver: bridge
